<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>云客 yunke.ai - CRM后台管理系统</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-img">云</div>
      <h1>云客 yunke.ai</h1>
      <p>CRM后台管理系统</p>
    </div>
    <form class="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>用户名</label>
        <div class="input-wrap">
          <span class="prefix-icon">&#x1F464;</span>
          <input type="text" id="username" placeholder="请输入用户名" value="admin" autocomplete="off">
        </div>
      </div>
      <div class="form-group">
        <label>密码</label>
        <div class="input-wrap">
          <span class="prefix-icon">&#x1F512;</span>
          <input type="password" id="password" placeholder="请输入密码" value="admin123" autocomplete="off">
        </div>
      </div>
      <div class="form-extra">
        <label><input type="checkbox" checked> 记住密码</label>
        <a href="javascript:void(0)">忘记密码？</a>
      </div>
      <button type="submit" class="btn-login">登 录</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
</div>
<div id="toastContainer"></div>
<script src="js/common.js"></script>
</body>
</html>
