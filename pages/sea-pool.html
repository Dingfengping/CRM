<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户公海 - 云客 yunke.ai</title>
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-layout">
  <nav class="top-nav">
    <div class="top-nav-left">
      <div class="logo-area">
        <div class="logo-sq">云</div>
        <span class="logo-name">云客</span>
        <span class="logo-domain">yunke.ai</span>
      </div>
      <div class="top-nav-menu">
        <div class="nav-item active" onclick="location.href='sea-pool.html'">客户</div>
        <div class="nav-item" onclick="location.href='call-center.html'">销售</div>
        <div class="nav-item">沟通</div>
        <div class="nav-item">AI分析</div>
        <div class="nav-item" onclick="location.href='settings.html'">设置</div>
      </div>
    </div>
    <div class="top-nav-right">
      <button class="btn-back">返回旧版</button>
      <button class="icon-btn">&#x1F50D;</button>
      <button class="icon-btn">&#x1F514;</button>
      <div class="user-area">
        <div class="user-avatar">超</div>
        <span class="user-name">超级管理员</span>
      </div>
    </div>
  </nav>

  <div class="main-body">
    <aside class="sidebar">
      <div class="sidebar-search">
        <input type="text" placeholder="&#x1F50D; 搜索菜单">
      </div>
      <div class="sidebar-menu">
        <div class="menu-item active expanded">
          &#x1F4CB; 客户管理 <span class="menu-arrow">&#x25B6;</span>
        </div>
        <div class="sub-menu open" style="max-height:200px;">
          <div class="menu-item active" onclick="location.href='sea-pool.html'">客户公海</div>
          <div class="menu-item" onclick="location.href='customer-list.html'">客户列表</div>
        </div>
        <div class="menu-item" onclick="location.href='call-center.html'">
          &#x1F4DE; 外呼工作台
        </div>
        <div class="menu-item">&#x1F4AC; 沟通记录</div>
        <div class="menu-item" onclick="location.href='settings.html'">&#x2699; 设置</div>
      </div>
    </aside>

    <main class="content-area">
      <div class="breadcrumb">
        <a>首页</a><span class="sep">/</span>
        <a>客户管理</a><span class="sep">/</span>
        <span>客户公海</span>
      </div>

      <div class="tabs">
        <div class="tab-item active" onclick="switchTab('stats', this)">数据统计</div>
        <div class="tab-item" onclick="switchTab('list', this)">客户公海</div>
      </div>

      <div id="tabContent"></div>
    </main>
  </div>
</div>

<div id="modalContainer"></div>
<div id="toastContainer"></div>
<script src="../js/common.js"></script>
<script>
  // 页面特有逻辑
  function switchTab(tab, el) {
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderTabContent(tab);
  }

  function renderTabContent(tab) {
    const container = document.getElementById('tabContent');
    if (tab === 'stats') {
      container.innerHTML = renderStatsHTML();
    } else {
      container.innerHTML = renderListHTML();
      renderSeaTable();
    }
  }

  function renderStatsHTML() {
    return `
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-icon" style="background:#E6F4FF;color:#1677FF;">&#x1F465;</div>
          <div class="stat-label">客户总数</div>
          <div class="stat-value">12,458<span class="unit">人</span></div>
          <div class="stat-trend up">&#x2191; 5.2% 较上月</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#FFFBE6;color:#FAAD14;">&#x1F30A;</div>
          <div class="stat-label">公海客户数</div>
          <div class="stat-value">8,732<span class="unit">人</span></div>
          <div class="stat-trend up">&#x2191; 2.1% 较上月</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#F6FFED;color:#52C412;">&#x2705;</div>
          <div class="stat-label">已分配客户数</div>
          <div class="stat-value">3,726<span class="unit">人</span></div>
          <div class="stat-trend down">&#x2193; 0.8% 较上月</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#F9F0FF;color:#722ED1;">&#x1F48E;</div>
          <div class="stat-label">金库会员数</div>
          <div class="stat-value">2,156<span class="unit">人</span></div>
          <div class="stat-trend up">&#x2191; 8.3% 较上月</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#FFF1F0;color:#FF4D4F;">&#x2B50;</div>
          <div class="stat-label">核心会员数</div>
          <div class="stat-value">4,892<span class="unit">人</span></div>
          <div class="stat-trend up">&#x2191; 3.7% 较上月</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <span>当前各租户客户数</span>
          <div class="time-range-selector">
            <span class="range-option" onclick="selectRange(this)">近7天</span>
            <span class="range-option active" onclick="selectRange(this)">近30天</span>
            <span class="range-option" onclick="selectRange(this)">近90天</span>
            <span class="range-option" onclick="selectRange(this)">自定义</span>
          </div>
        </div>
        <div class="chart-placeholder">📊 柱状图 — 租户客户数统计（好享购物外呼: 3,421 | 贵州民族酒业: 2,156 | 高德博思: 1,892 | 家有: 1,263）</div>
      </div>

      <div class="card">
        <div class="card-title"><span>新会员</span></div>
        <div class="chart-placeholder chart-small">📈 折线图 — 新会员趋势（03-10: 45 | 03-11: 52 | 03-12: 38 | 03-13: 61 | 03-14: 48 | 03-15: 55 | 03-16: 42 | 03-17: 67）</div>
      </div>
    `;
  }

  function renderListHTML() {
    return `
      <div class="action-bar">
        <span class="page-title-inline">企业公海</span>
        <select class="search-type"><option>客户编号</option><option>客户姓名</option><option>客户手机号</option></select>
        <input type="text" class="search-input" placeholder="请输入客户编号">
        <button class="btn btn-primary btn-sm">&#x1F50D; 搜索</button>
        <button class="btn btn-secondary btn-sm" onclick="toggleFilter()">&#x2699; 高级筛选</button>
        <button class="btn-icon-only" style="width:32px;border:1px solid #D9D9D9;border-radius:6px;background:#fff;cursor:pointer;">⋮</button>
        <button class="btn btn-secondary btn-sm" onclick="openImportModal()">导入</button>
        <button class="btn btn-primary" onclick="openCreateCustomerModal()">+ 新建客户</button>
      </div>

      <div class="filter-area" id="filterArea">
        <div class="filter-row">
          <div class="filter-item"><span class="filter-label">性别:</span><select><option>全部</option><option>男</option><option>女</option></select></div>
          <div class="filter-item"><span class="filter-label">会员等级:</span><select><option>全部</option><option>优选SVIP会员</option><option>优选七星会员</option></select></div>
          <div class="filter-item"><span class="filter-label">注册日期:</span><input type="date" style="height:32px;border:1px solid #D9D9D9;border-radius:6px;padding:0 8px;font-size:13px;"></div>
          <div class="filter-item"><span class="filter-label">是否已分配:</span><select><option>全部</option><option>已分配</option><option>未分配</option></select></div>
          <button class="btn-reset">重置</button>
        </div>
      </div>

      <div class="sub-tabs">
        <div class="sub-tab active" onclick="switchSubTab('all', this)">全部 <span class="count">87372</span></div>
        <div class="sub-tab" onclick="switchSubTab('assigned', this)">已分配 <span class="count">3726</span></div>
        <div class="sub-tab" onclick="switchSubTab('unassigned', this)">未分配 <span class="count">83646</span></div>
      </div>

      <div class="table-stats">
        <span>共 <b style="color:#1D2129;">87,372</b> 条记录 &nbsp; <span class="link" onclick="selectAllRows()">选择全部</span></span>
      </div>

      <div class="batch-bar hidden" id="batchBar">
        已选 <span class="selected-count" id="batchCount">0</span> 项 &nbsp;
        <button class="btn btn-sm btn-secondary" onclick="openAssignModal()">批量分配</button>
        <button class="btn btn-sm btn-danger" onclick="openDeleteModal()">批量删除</button>
        <button class="btn btn-sm btn-text" onclick="clearSelection()">取消选择</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:40px;text-align:center;"><input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this)"></th>
              <th style="width:260px;">客户</th>
              <th style="width:140px;">会员等级</th>
              <th style="width:140px;">所属租户</th>
              <th style="width:100px;text-align:center;">是否已加微信</th>
              <th style="width:80px;text-align:center;">年龄</th>
              <th style="width:120px;" class="sortable" onclick="sortTable('regDate')">注册日期 ↕</th>
              <th style="width:180px;">最近订购商品</th>
              <th style="width:100px;text-align:right;">售价</th>
              <th style="width:120px;text-align:center;">操作</th>
            </tr>
          </thead>
          <tbody id="seaTableBody"></tbody>
        </table>
      </div>

      <div class="pagination">
        <span>共 87,372 条</span>
        <select><option>20 条/页</option></select>
        <button class="page-btn disabled">&lt;</button>
        <button class="page-btn active">1</button>
        <button class="page-btn">2</button>
        <button class="page-btn">3</button>
        <span>...</span>
        <button class="page-btn">4369</button>
        <button class="page-btn">&gt;</button>
      </div>
    `;
  }

  function renderSeaTable() {
    const tbody = document.getElementById('seaTableBody');
    if (!tbody) return;
    tbody.innerHTML = CUSTOMER_DATA.map(c => `
      <tr data-id="${c.id}">
        <td class="center"><input type="checkbox" onchange="toggleRowSelect('${c.id}', this)"></td>
        <td>
          <div class="customer-cell">
            <div class="customer-avatar">${c.name.charAt(0)}</div>
            <div class="customer-info">
              <div class="cust-name">${c.name}</div>
              <div class="cust-id">${c.id} <span class="copy-icon" onclick="copyToClipboard('${c.id}')" title="复制">📋</span></div>
            </div>
          </div>
        </td>
        <td><span class="tag ${c.levelTag}">${c.level}</span></td>
        <td>${c.tenant}</td>
        <td class="center">${c.hasWechat ? '<span style="color:#52C412;">✓</span>' : '<span style="color:#C9CDD4;">✕</span>'}</td>
        <td class="center">${c.age}</td>
        <td>${c.regDate}</td>
        <td>${c.product}</td>
        <td class="right">${c.price}</td>
        <td class="center">
          <div class="action-links">
            <a onclick="openCustomerDetail('${c.id}')">查看</a>
            <span class="sep">|</span>
            <a onclick="openAssignModal('${c.id}')">分配</a>
            <span class="sep">|</span>
            <a onclick="showMoreMenu(event, '${c.id}')">更多▾</a>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // 默认显示统计Tab
  renderTabContent('stats');
</script>
</body>
</html>
