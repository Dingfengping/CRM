<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设置 - 云客 yunke.ai</title>
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-layout">
  <nav class="top-nav">
    <div class="top-nav-left">
      <div class="logo-area">
        <div class="logo-sq">云</div>
        <span class="logo-name">云客</span>
        <span class="logo-domain">yunke.ai</span>
      </div>
      <div class="top-nav-menu">
        <div class="nav-item" onclick="location.href='sea-pool.html'">客户</div>
        <div class="nav-item" onclick="location.href='call-center.html'">销售</div>
        <div class="nav-item">沟通</div>
        <div class="nav-item">AI分析</div>
        <div class="nav-item active" onclick="location.href='settings.html'">设置</div>
      </div>
    </div>
    <div class="top-nav-right">
      <button class="btn-back">返回旧版</button>
      <button class="icon-btn">&#x1F50D;</button>
      <button class="icon-btn">&#x1F514;</button>
      <div class="user-area">
        <div class="user-avatar">超</div>
        <span class="user-name">超级管理员</span>
      </div>
    </div>
  </nav>

  <div class="main-body">
    <aside class="sidebar">
      <div class="sidebar-search">
        <input type="text" placeholder="&#x1F50D; 搜索菜单">
      </div>
      <div class="sidebar-menu">
        <div class="menu-item" onclick="location.href='sea-pool.html'">&#x1F4CB; 客户管理</div>
        <div class="menu-item" onclick="location.href='call-center.html'">&#x1F4DE; 外呼工作台</div>
        <div class="menu-item">&#x1F4AC; 沟通记录</div>
        <div class="menu-item active">&#x2699; 设置</div>
      </div>
    </aside>

    <main class="content-area">
      <div class="breadcrumb">
        <a>首页</a><span class="sep">/</span>
        <span>设置</span>
      </div>

      <div class="settings-layout">
        <div class="settings-menu">
          <div class="settings-menu-item active" onclick="switchSettingsTab('basic', this)">基本设置</div>
          <div class="settings-menu-item" onclick="switchSettingsTab('staff', this)">人员管理</div>
          <div class="settings-menu-item" onclick="switchSettingsTab('role', this)">角色权限</div>
          <div class="settings-menu-item" onclick="switchSettingsTab('rule', this)">客户规则</div>
          <div class="settings-menu-item" onclick="switchSettingsTab('call', this)">外呼设置</div>
          <div class="settings-menu-item" onclick="switchSettingsTab('notify', this)">系统通知</div>
        </div>

        <div class="settings-content" id="settingsContent">
          <h3>基本设置</h3>
          <div class="form-group">
            <label>系统名称</label>
            <input type="text" value="云客CRM" style="width:320px;">
          </div>
          <div class="form-group">
            <label>企业Logo</label>
            <div style="display:flex;align-items:center;gap:12px;">
              <div style="width:120px;height:40px;background:#E6F4FF;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#1677FF;font-size:14px;font-weight:500;">云客CRM</div>
              <button class="btn btn-secondary btn-sm">上传图片</button>
              <span style="font-size:12px;color:#86909C;">支持 jpg/png, 建议 120×40px</span>
            </div>
          </div>
          <div class="form-group">
            <label>企业名称</label>
            <input type="text" value="云客科技有限公司" style="width:320px;">
          </div>
          <div class="form-group">
            <label>联系电话</label>
            <input type="text" value="400-888-9999" style="width:320px;">
          </div>
          <div class="form-group">
            <label>数据保留天数</label>
            <input type="number" value="365" style="width:200px;">
          </div>
          <div style="margin-top:24px;display:flex;gap:8px;">
            <button class="btn btn-primary" onclick="showToast('保存成功','success')">保存</button>
            <button class="btn btn-secondary">重置</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="modalContainer"></div>
<div id="toastContainer"></div>
<script src="../js/common.js"></script>
<script>
  function switchSettingsTab(tab, el) {
    document.querySelectorAll('.settings-menu-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');

    const content = document.getElementById('settingsContent');
    const titles = {
      basic: '基本设置',
      staff: '人员管理',
      role: '角色权限',
      rule: '客户规则',
      call: '外呼设置',
      notify: '系统通知'
    };
    content.innerHTML = `<h3>${titles[tab]}</h3>
      <div class="empty-state">
        <div class="empty-icon">⚙️</div>
        <div class="empty-text">${titles[tab]}页面内容</div>
        <button class="btn btn-primary" onclick="showToast('功能开发中','info')">查看示例</button>
      </div>`;
  }
</script>
</body>
</html>
